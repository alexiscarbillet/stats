name: Fetch stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run fetch script
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          node scripts/fetch_stats.js

      - name: Install frontend dependencies
        run: |
          cd web
          npm install

      - name: Set Git Identity Global
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and Deploy frontend
        run: |
          cd web
          npm run build
          # Using the absolute path ($GITHUB_WORKSPACE) ensures gh-pages finds the folder perfectly
          npx gh-pages -d $GITHUB_WORKSPACE/web/dist -r "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      # Finally, we save the data folder back to the main branch
      - name: Commit data back to repo
        run: |
          git add data
          git commit -m "Update stats data" || echo "No changes to commit"
          git push