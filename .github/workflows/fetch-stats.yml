name: Fetch stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

# This tells GitHub to allow this specific workflow to deploy to Pages natively
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 1. Fetch your data
      - name: Run fetch script
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          node scripts/fetch_stats.js

      # 2. Save the fresh data files back to your main branch
      - name: Commit data back to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update stats data" || echo "No changes to commit"
          git push

      # 3. Build the frontend by explicitly telling Vite where the index.html is
      - name: Install and Build frontend
        run: |
          cd web
          npm install
          npx vite build --root .. --outDir dist

      # 4. Package the built files directly from the root dist folder
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/'

      # 5. Direct deployment to live site
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4