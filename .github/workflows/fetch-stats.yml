name: Fetch stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

# 1. ADD THIS: Gives the action permission to write/push to your repository branches
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run fetch script
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          node scripts/fetch_stats.js

      - name: Install frontend dependencies
        run: |
          cd web
          npm install

      # 2. Set identity globally
      - name: Set Git Identity Global
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and Deploy frontend
        run: |
          # 1. Build using prefix so it runs inside /web but keeps our terminal at the root
          npm run build --prefix web
          
          # 2. Deploy passing the exact absolute path using the GitHub workspace variable
          npx gh-pages -d web/dist -r "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Commit data back to repo
        run: |
          git add data
          git commit -m "Update stats data" || echo "No changes to commit"
          git push